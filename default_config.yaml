# Model Architecture
model:
  in_dim: 4
  hidden_dim: 256
  topo_dim: 4
  num_motifs: 8
  num_classes: 2
  dropout: 0.3
  num_layers: 3
  num_heads: 8
  lambda_contrast: 0.001
  lambda_topo: 0.05
  lambda_motif: 0.05

# Training
training:
  batch_size: 32
  epochs: 300
  learning_rate: 1e-4
  weight_decay: 1e-5
  scheduler: cosine_annealing
  warmup_epochs: 0

# Data
data:
  dataset: 
  data_path: 
  split_ratio: [0.8, 0.1, 0.1]
  scaffold_split: true
  random_seed: 42

# Logging
logging:
  log_dir: logs
  save_dir: checkpoints
  save_best: true
  tensorboard: true
